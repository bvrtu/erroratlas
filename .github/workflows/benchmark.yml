name: External benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run benchmark:external
      - run: npm run check:data
      - uses: actions/upload-artifact@v5
        with:
          name: erroratlas-external-benchmark
          path: |
            data/external-benchmark-v4.json
            data/external-benchmark-summary-v1.json
            docs/benchmark.md
